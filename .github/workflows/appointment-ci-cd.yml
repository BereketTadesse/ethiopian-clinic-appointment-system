name: Appointment Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "services/appointment-service/**"
      - ".github/workflows/appointment-ci-cd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "services/appointment-service/**"
      - ".github/workflows/appointment-ci-cd.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push appointment-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/appointment-service
          file: ./services/appointment-service/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/appointment-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/appointment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
